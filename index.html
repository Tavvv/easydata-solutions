<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Data Solutions — IT Infrastructure for EEC Thailand</title>
    <meta name="description" content="IT infrastructure, server & virtualization, network security, and hardware procurement for BOI-approved factories in Chonburi, Rayong, and Chachoengsao." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Detect language from URL path before React hydrates
      (function() {
        var path = window.location.pathname;
        var lang = path.split('/')[1];
        if (['en','zh','th'].indexOf(lang) !== -1) {
          document.documentElement.lang = lang;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
